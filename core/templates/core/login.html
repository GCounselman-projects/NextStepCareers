{% extends 'core/base.html' %}

{% block title %}Login | NextStep Careers{% endblock %}

{% block content %}
<section class="content-band">
    <div class="shell form-shell">
        <div class="form-card">
            <p class="eyebrow">Account access</p>
            <h1>Login</h1>
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button class="button" type="submit">Sign in</button>
            </form>
            <p class="auth-link">Don't have an account? <a href="{% url 'signup' %}">Sign up</a>.</p>
        </div>
    </div>
</section>
{% endblock %}
