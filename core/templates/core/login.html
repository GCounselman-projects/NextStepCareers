{% extends 'core/base.html' %}

{% block content %}
<div class="card">
    <h1>Login</h1>
    <form method="post">{% csrf_token %}
        {{ form.as_p }}
        <button class="button" type="submit">Sign In</button>
    </form>
    <p>Don't have an account? <a href="{% url 'signup' %}">Sign up</a>.</p>
</div>
{% endblock %}
