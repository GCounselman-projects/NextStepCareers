{% extends 'core/base.html' %}

{% block content %}
<div class="card">
    <h1>Delete Job</h1>
    <p>Are you sure you want to delete the job posting <strong>{{ job.title }}</strong>?</p>
    <form method="post">{% csrf_token %}
        <button class="button" type="submit">Yes, delete</button>
        <a class="button secondary" href="{% url 'dashboard' %}">Cancel</a>
    </form>
</div>
{% endblock %}
