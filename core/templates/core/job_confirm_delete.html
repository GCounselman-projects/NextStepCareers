{% extends 'core/base.html' %}

{% block title %}Delete Job | NextStep Careers{% endblock %}

{% block content %}
<section class="content-band">
    <div class="shell form-shell">
        <div class="form-card">
            <a class="button tertiary compact iconless page-back-link" href="{{ back_url }}">Back</a>
            <p class="eyebrow">Confirm action</p>
            <h1>Delete job</h1>
            <p>Are you sure you want to delete the job posting <strong>{{ job.title }}</strong>?</p>
            <form method="post">
                {% csrf_token %}
                <input type="hidden" name="next" value="{{ back_url }}">
                <div class="inline-actions">
                    <button class="button danger" type="submit">Yes, delete</button>
                    <a class="button secondary iconless" href="{{ back_url }}">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</section>
{% endblock %}
