{% extends 'core/base.html' %}

{% block title %}{{ title }} | NextStep Careers{% endblock %}

{% block content %}
<section class="content-band">
    <div class="shell form-shell">
        <div class="form-card">
            <p class="eyebrow">Job listing</p>
            <h1>{{ title }}</h1>
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button class="button" type="submit">Save job</button>
            </form>
        </div>
    </div>
</section>
{% endblock %}
