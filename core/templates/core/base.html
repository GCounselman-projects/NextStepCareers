<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NextStep Careers</title>
    <style>
        html { height: 100%; }
        body { min-height: 100vh; display: flex; flex-direction: column; margin: 0; padding: 0; font-family: Arial, sans-serif; background: #f4f6f8; color: #202124; }
        header, footer { background: #1e8e3e; color: white; padding: 16px 24px; }
        header a, footer a { color: white; text-decoration: none; margin-right: 16px; }
        nav { display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; }
        .container { flex: 1; max-width: 960px; margin: 24px auto; padding: 0 16px; }
        .card { background: white; border-radius: 8px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,.1); margin-bottom: 20px; }
        .button { display: inline-block; background: #1e8e3e; color: white; padding: 10px 16px; border-radius: 4px; text-decoration: none; }
        .button.secondary { background: #4f7758; }
        .flash { padding: 12px 16px; margin-bottom: 16px; border-radius: 4px; }
        .flash.success { background: #d4edda; color: #155724; }
        .flash.error { background: #f8d7da; color: #721c24; }
        form label { display: block; margin-top: 12px; font-weight: bold; }
        form input, form textarea, form select { width: 100%; padding: 10px; margin-top: 6px; border: 1px solid #ced4da; border-radius: 4px; }
        .field-radio { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }
        .field-radio label { display: inline-flex; align-items: center; gap: 6px; font-weight: normal; }
        .field-radio input[type="radio"] { margin: 0; vertical-align: middle; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px 8px; border-bottom: 1px solid #e0e0e0; }
        .inline-actions a { margin-right: 8px; }
    </style>
</head>
<body>
<header>
    <nav>
        <div><a href="{% url 'home' %}"><strong>NextStep Careers</strong></a></div>
        <div>
            <a href="{% url 'home' %}">Jobs</a>
            {% if request.user.is_authenticated %}
                <a href="{% url 'dashboard' %}">Dashboard</a>
                <a href="{% url 'profile_edit' %}">Profile</a>
                <a href="{% url 'notifications' %}">Notifications</a>
                <form method="post" action="{% url 'logout' %}" style="display: inline; margin: 0;">
                    {% csrf_token %}
                    <button class="button secondary" type="submit" style="margin: 0; vertical-align: middle;">Logout</button>
                </form>
            {% else %}
                <a href="{% url 'login' %}">Login</a>
                <a href="{% url 'signup' %}">Sign Up</a>
            {% endif %}
        </div>
    </nav>
</header>
<div class="container">
    {% if messages %}
        {% for message in messages %}
            <div class="flash {% if message.tags %}{{ message.tags }}{% endif %}">{{ message }}</div>
        {% endfor %}
    {% endif %}
    {% block content %}{% endblock %}
</div>
<footer>
    <div class="container">NextStep Careers &copy; 2026</div>
</footer>
</body>
</html>
