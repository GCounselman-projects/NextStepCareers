{% extends 'core/base.html' %}

{% block title %}Apply to {{ job.title }} | NextStep Careers{% endblock %}

{% block content %}
<section class="content-band">
    <div class="shell form-shell">
        <div class="form-card">
            <a class="button tertiary compact iconless page-back-link" href="{{ back_url }}">Back</a>
            <p class="eyebrow">Application</p>
            <h1>Apply to {{ job.title }}</h1>
            <dl class="definition-list">
                <div>
                    <dt>Employer</dt>
                    <dd>{{ job.employer_name }}</dd>
                </div>
            </dl>
            <form method="post">
                {% csrf_token %}
                <input type="hidden" name="next" value="{{ back_url }}">
                {{ form.as_p }}
                <button class="button" type="submit">Submit application</button>
            </form>
        </div>
    </div>
</section>
{% endblock %}
